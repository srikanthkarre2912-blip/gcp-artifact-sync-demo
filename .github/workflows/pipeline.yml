name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set image variables
      run: |
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        echo "IMAGE_REPO=asia-south1-docker.pkg.dev/practice-483609/dockerdemo1/httpd-demo" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_REPO:$IMAGE_TAG ./app

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker asia-south1-docker.pkg.dev

    - name: Push Image
      run: |
        docker push $IMAGE_REPO:$IMAGE_TAG

    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"$IMAGE_TAG\"/" helm/httpd/values.yaml

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        branch: image-update-${{ env.IMAGE_TAG }}
        title: Update image tag
        commit-message: Update image tag
        delete-branch: true