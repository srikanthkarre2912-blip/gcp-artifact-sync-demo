name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set image variables
      run: |
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        echo "IMAGE_REPO=asia-south1-docker.pkg.dev/practice-483609/dockerdemo1/httpd-demo" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_REPO:$IMAGE_TAG ./app

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

    - name: Push Docker Image
      run: |
        docker push $IMAGE_REPO:$IMAGE_TAG

    - name: Update Helm values.yaml
      run: |
        sed -i "s/tag:.*/tag: \"$IMAGE_TAG\"/" helm/httpd/values.yaml

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v6
      with:
        branch: image-update-${{ env.IMAGE_TAG }}
        title: "Update Helm image tag"
        body: "Automated update of Helm values with new image tag"
        commit-message: "Update image tag to ${{ env.IMAGE_TAG }}"
        delete-branch: true