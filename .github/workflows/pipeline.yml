name: CI Pipeline

on:
  push:
    branches: [globe]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set image tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: Build Docker image
      run: |
        docker build -t $IMAGE .

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Configure Docker
      run: gcloud auth configure-docker asia-south1-docker.pkg.dev

    - name: Push Image
      run: |
        docker tag $IMAGE asia-south1-docker.pkg.dev/PROJECT/demo/httpd:$IMAGE_TAG
        docker push asia-south1-docker.pkg.dev/PROJECT/demo/httpd:$IMAGE_TAG

    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"$IMAGE_TAG\"/" helm/httpd/values.yaml

    - name: Create PR
      uses: peter-evans/create-pull-request@v6
      with:
        branch: image-update-${{ env.IMAGE_TAG }}
        title: Update image tag
        commit-message: Update image tag
